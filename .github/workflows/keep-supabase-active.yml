name: Keep Supabase Active

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bms-supabase-heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Update heartbeat and clean old diagnostics
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
          BMS_HEARTBEAT_TOKEN: ${{ secrets.BMS_HEARTBEAT_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_PUBLISHABLE_KEY"
          test -n "$BMS_HEARTBEAT_TOKEN"
          curl --fail-with-body --silent --show-error \
            --retry 3 --retry-delay 5 --retry-all-errors \
            "$SUPABASE_URL/rest/v1/rpc/heartbeat_bms_service" \
            -H "apikey: $SUPABASE_PUBLISHABLE_KEY" \
            -H "Content-Type: application/json" \
            --data "{\"p_token\":\"$BMS_HEARTBEAT_TOKEN\"}" \
            >/dev/null
